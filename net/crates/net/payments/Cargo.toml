[package]
name = "net-payments"
version = "0.33.0"
edition = "2021"
# Benches are registered explicitly with `[[bench]]` (see the bottom of
# this file). `autobenches = false` keeps Cargo from auto-discovering
# `benches/*.rs`, so the shared `benches/bench_common/` harness directory
# is never mistaken for a bench target â€” the same regime as `sdk/Cargo.toml`.
autobenches = false
description = "x402-native payments layer for the Net mesh: signed envelopes around x402 v2, tiered verification, spend policy, billing events"
license = "Apache-2.0"
repository = "https://github.com/ai-2070/net"
keywords = ["x402", "payments", "mesh", "caip"]
categories = ["network-programming", "cryptography"]

[lib]
name = "net_payments"

[lints.clippy]
# Same panic-hygiene posture as the core crate (see the root
# Cargo.toml for the warn-vs-deny rationale â€” CI enforces deny on
# lib/bins, tests keep unwrap).
unwrap_used                   = "warn"
expect_used                   = "warn"
undocumented_unsafe_blocks    = "warn"
multiple_unsafe_ops_per_block = "warn"

[dependencies]
# Dependency direction is doctrine: net-payments depends on the core
# and the SDK; the core and SDK NEVER depend on net-payments. The
# substrate stays clean for apps that never touch money.
#
# `net` (feature "net") supplies the identity surface payment
# envelopes sign with: `EntityKeypair` / `EntityId` (ed25519,
# verify_strict). Provider identity on a quote IS the mesh entity
# identity â€” x402 wallet identity is a payment credential, not a
# participant identity.
net = { package = "net-mesh", version = "0.33.0", path = "..", default-features = false, features = ["net"] }
# The SDK supplies the consent/pins vocabulary the payment policy
# store mirrors (`CapabilityId`, the locked-store pattern) and is the
# surface WS4 composes against (gateway / publish options).
net-sdk = { package = "net-mesh-sdk", version = "0.33.0", path = "../sdk", default-features = false }
# The MCP demand-side gate seam (`net_mcp::serve::PaymentFlow`).
# Optional, behind `mcp-gate`: only payment-aware gateway hosts (the
# Python binding, agent runtimes) pull the adapter; the payments core
# stays adapter-free. The adapter never depends back on this crate.
net-mcp = { package = "net-mesh-mcp", version = "0.33.0", path = "../adapters/mcp", optional = true }

serde = { version = "1", features = ["derive"] }
serde_json = { version = "1", features = ["raw_value"] }
thiserror = "2"
# x402 carries are byte-preserved originals; envelopes transport them
# base64-encoded so no binding can accidentally re-serialize JSON
# through its own encoder (the envelope-drift bug class).
base64 = "0.22"
# terms_hash / verification-chain links / idempotency keys â€” blake3
# is the established content hash in this workspace (dataforts,
# delegation child-seed KDF).
blake3 = "1"
hex = "0.4"
# exact-XRPL invoice binding: InvoiceID = SHA256(invoiceId) (pinned t54
# scheme). Already in the workspace tree via ed25519-dalek â€” no new
# supply chain; a named money-path dependency all the same.
sha2 = "0.11"
# Cross-process advisory lock + per-user path resolution for the
# payment policy store â€” the exact `sdk/src/pins.rs` regime.
fs2 = "0.4"
dirs = "6"
tokio = { version = "1", features = ["rt", "time", "sync", "fs"] }
async-trait = "0.1"
# Workspace lock discipline (clippy disallowed-methods bans
# std::sync::Mutex::lock â€” poisoning is unhandled everywhere here).
parking_lot = "0.12"
# HTTP client for the real-facilitator boundary (`http-facilitator`).
# rustls, no default features: no openssl, no cookies, no proxies from
# env â€” the money path gets exactly the transport it needs. reqwest 0.13
# folded the old `rustls-tls` feature into `rustls`; we take
# `rustls-no-provider` instead and supply the crypto provider ourselves
# (see the `rustls` dep below) to keep ring rather than 0.13's aws-lc-rs
# default â€” no cmake / C toolchain in the money-path build.
reqwest = { version = "0.13", optional = true, default-features = false, features = ["rustls-no-provider"] }
# The rustls crypto provider for the money path: ring, explicitly, so the
# build needs no C compiler (aws-lc-rs, 0.13's default, pulls aws-lc-sys +
# cmake). `src/tls_roots.rs` builds an explicit `ClientConfig` with this
# provider and hands it to reqwest's `use_preconfigured_tls` â€” so no
# process-global provider is ever installed (which would leak into other
# rustls users in the host process). Pinned to reqwest's rustls (0.23) so
# the graph has a single rustls and the preconfigured-TLS downcast matches.
rustls = { version = "0.23", optional = true, default-features = false, features = ["ring", "std", "tls12", "logging"] }
# Compiled-in Mozilla trust roots. reqwest 0.13 dropped the bundled-roots
# feature in favor of the OS platform verifier; we pin these explicitly
# into the `ClientConfig` root store (see `src/tls_roots.rs`) so the money
# path's trust anchors stay hermetic and deterministic across deploy targets.
webpki-root-certs = { version = "1", optional = true }
# secp256k1 ECDSA + keccak256, for the DEV signer only
# (`unsafe-dev-signer`). Production signing is external; these never
# compile into a default build.
k256 = { version = "0.14", optional = true, default-features = false, features = ["ecdsa"] }
sha3 = { version = "0.12", optional = true }
tracing = "0.1"

[features]
# Implements `net_mcp::serve::PaymentFlow` for the caller flow, so the
# gated-invoke composition can clear paid capabilities through this
# crate's spend engine + lifecycle. Off by default â€” payments users who
# never touch the MCP gateway don't pay the adapter's build cost.
mcp-gate = ["dep:net-mcp"]
# The mesh wire for the payment lifecycle: `serve_payments` (provider
# side, nRPC quote/pay services over PaymentEngine) +
# `MeshPaymentChannel` (caller side, the ProviderChannel that crosses
# machines). Off by default â€” pulls the SDK's mesh transport + typed
# nRPC surface.
mesh = ["net-sdk/net", "net-sdk/cortex"]
# The real-facilitator HTTP client (P1): `HttpFacilitator` speaking
# `POST /verify`, `POST /settle`, `GET /supported` per the pinned x402
# v2 spec. The first (and only) HTTP dependency in the money path â€”
# rustls only, feature-gated so mock-only consumers never build it.
# sha3 also rides here: the eip155 checker computes the
# AuthorizationUsed(address,bytes32) topic hash at runtime.
http-facilitator = ["dep:reqwest", "dep:rustls", "dep:webpki-root-certs", "dep:sha3"]
# DEV/TESTNET ONLY: a local-key EIP-712 signer for conformance runs.
# The name is the warning â€” production settlement signing goes through
# `ExternalSigner` (KMS/wallet/MPC; the key never enters Net memory).
# Never in default features, never in release binding builds; doctrine
# 4/7/8 (non-custodial, keys never cross boundaries, no signing
# oracle) is why this is a feature and not a constructor.
unsafe-dev-signer = ["dep:k256", "dep:sha3"]

[dev-dependencies]
tokio = { version = "1", features = ["rt-multi-thread", "macros", "time", "test-util"] }
tempfile = "3"
# Benchmark harness. `criterion` (async_tokio) drives the point-latency
# benches (admission accept/redeem/rejections, mock lifecycle); the
# concurrency / tail benches (paid-vs-unpaid, spend contention, the
# duplicate storm) use a custom `hdrhistogram` loop for real p99 â€”
# exactly the split the SDK's nRPC bench suite uses (nrpc_unary vs
# nrpc_tail). Same criterion 0.8 as the core + sdk crates.
criterion = { version = "0.8", features = ["async_tokio"] }
hdrhistogram = "7"
# The mesh e2e test builds real two-node meshes (MeshBuilder + typed
# nRPC); tests can't reach transitive deps, so the SDK appears here
# with the transport features on. `tool` powers the mega-e2e's
# `serve_tool_paid` + `metadata_for` (the native paid-serve path,
# driven against the real `EngineToolPaymentGate`) â€” dev-only, so the
# shipped `mesh` feature keeps its narrower surface.
net-sdk = { package = "net-mesh-sdk", version = "0.33.0", path = "../sdk", default-features = false, features = ["net", "cortex", "tool"] }
# `JsonSchema` for the mega-e2e's tool request/response types (the
# `serve_tool_paid` descriptor derives its schema from them).
schemars = "1"
# `Bytes` for the mega-e2e's `Mesh::call` tool invocation.
bytes = "1"
# A capturing `Layer` for the redeem-denial emit-site test â€” asserts the
# structured `tracing` fields (`reason` / `stage` / `recovery_class`) by
# key+value, so operators' grep contract is a test, not a hope.
tracing-subscriber = "0.3"

# ---------------------------------------------------------------------------
# Benchmarks. All `harness = false` â€” each bench owns its `main` (criterion
# or a custom hdrhistogram loop). The shared setup lives in the
# `benches/bench_common/` directory (not a bench target; see `autobenches`).
# See `docs/plans/PAYMENTS_BENCHMARKS_PLAN.md`.
# ---------------------------------------------------------------------------

# B1 + B5 â€” provider admission overhead + the duplicate-storm invariant.
# The headline: how much latency Net adds when a proof is already available.
# In-process, no mesh, no network â€” needs no extra features.
[[bench]]
name = "admission"
harness = false

# Redemption-gate matrix (before/after the read-only-denial write-
# amplification fix): redeem outcomes Ă— store cardinality Ă— concurrency.
[[bench]]
name = "redeem_matrix"
harness = false

# B3 â€” spend-policy contention: concurrent check_and_reserve against one
# shared JSON store under the fs2 lock, across store history sizes.
[[bench]]
name = "spend_contention"
harness = false

# B2 â€” paid vs unpaid nRPC over a warm two-node mesh at c1/16/128. The
# mesh wire (serve_payments / MeshPaymentChannel / serve_tool_paid) is
# behind the `mesh` feature.
[[bench]]
name = "mesh_paid_invoke"
harness = false
required-features = ["mesh"]

# B4 â€” full in-process + mesh mock lifecycle (software path, not x402/chain).
[[bench]]
name = "mock_lifecycle"
harness = false
required-features = ["mesh"]
