[package]
name = "ai2070-net-sdk"
version = "0.12.0"
edition = "2021"
description = "Ergonomic Rust SDK for the Net mesh network"
license = "Apache-2.0"
repository = "https://github.com/ai-2070/net"
readme = "README.md"
keywords = ["net", "mesh", "event-bus", "streaming"]
categories = ["asynchronous", "network-programming"]

[lib]
# Keep the crate name as `net_sdk` so `use net_sdk::...` resolves
# without code changes; the published artifact is `ai2070-net-sdk`
# on crates.io.
name = "net_sdk"

[dependencies]
# `version` is required for `cargo publish` to resolve the dep on
# crates.io; the `path` is preferred during local workspace builds.
net = { package = "ai2070-net", version = "0.12.0", path = "..", features = [] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
bytes = "1"
futures = "0.3"
tokio = { version = "1", features = ["rt", "time", "sync"] }
pin-project-lite = "0.2"
thiserror = "2"
async-trait = "0.1"

[dev-dependencies]
tokio = { version = "1", features = ["rt-multi-thread", "macros", "time", "test-util"] }

[features]
default = []
# External transports (opt-in, network I/O).
redis = ["net/redis"]
jetstream = ["net/jetstream"]
# Core mesh transport (encrypted UDP + subprotocols). Bundles the
# identity, capabilities, and subnet surfaces — they all live behind
# `adapter::net` in core and are operationally inseparable (subnet
# enforcement reuses the capability-announcement dispatch; channel
# auth uses identity + capabilities + subnets together), so exposing
# them as separate SDK flags created pick-your-own-subset
# combinations that weren't actually meaningful.
net = ["net/net"]
# NAT traversal — reflex probes, classification, and
# rendezvous-coordinated hole-punch. Exposes `Mesh::nat_type`,
# `reflex_addr`, `connect_direct`, `traversal_stats`,
# `probe_reflex`, and `reclassify_nat`. Off by default because
# the surface is optional: callers that rely solely on the
# routed-handshake path never need it. Framing: these APIs are
# *optimization, not correctness* — routed-handshake reaches
# every peer regardless, and a `symmetric` NAT type or a
# `punch-failed` error just means traffic keeps riding the
# relay.
nat-traversal = ["net", "net/nat-traversal"]
# Port mapping — opportunistic UPnP-IGD / NAT-PMP / PCP install
# at startup. Exposes `MeshBuilder::try_port_mapping(bool)` on
# the SDK surface. Builds on `nat-traversal` (the port-mapping
# task calls the same `set_reflex_override` / `clear_reflex_override`
# runtime setters). Off by default — port mapping modifies
# state on the user's router and some environments forbid it.
port-mapping = ["nat-traversal", "net/port-mapping"]
# CortEX adds the typed event-sourced adapters (tasks + memories) plus
# the NetDb facade. `redex-disk` comes along so `.persistent(true)` is
# usable from the SDK without a separate feature flip.
cortex = ["net/netdb", "net/redex-disk"]
# Compute surface — `MeshDaemon` trait + `DaemonRuntime` for local
# spawn / snapshot / stop. Requires `net` because daemons have a
# mesh identity (ed25519 keypair + origin_hash) that rides on the
# same `Identity` the channel-auth path uses.
compute = ["net"]
# HA / scaling overlays — `ReplicaGroup` / `ForkGroup` /
# `StandbyGroup`. Sits on top of `compute`; a caller with just
# `compute` gets single-daemon spawn / snapshot / migration, and
# `groups` adds the N-member coordination primitives on top.
groups = ["compute"]
# Everything that runs locally (mesh + storage/state + security +
# compute + groups, no external transports). The default shape for
# a single-node or LAN-only deployment.
local = ["net", "cortex", "compute", "groups"]
# Everything — local stack plus external transports.
full = ["local", "redis", "jetstream"]

# nRPC quickstart — requires net + cortex.
[[example]]
name = "nrpc_echo"
required-features = ["net", "cortex"]
