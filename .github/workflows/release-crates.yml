name: Release Rust crates

# Publishes `net-mesh`, `net-mesh-sdk-macros`, and `net-mesh-sdk`
# to crates.io.
#
# Tag schema: `crates-v<semver>`. The three crates publish in
# dependency order — `net-mesh` and `net-mesh-sdk-macros` first
# (independent), then `net-mesh-sdk` once the index has caught up.
#
# Required repository secret: `CARGO_REGISTRY_TOKEN`
#   Generate at https://crates.io/me with the `publish-update`
#   scope restricted to `net-mesh*` after all crates exist on
#   crates.io. The first publish requires a wider scope (or a
#   broader account-level token) because crates.io scopes can
#   only be set on existing crates.

on:
  push:
    tags:
      - "crates-v*"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: Publish net-mesh + net-mesh-sdk-macros + net-mesh-sdk
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            net/crates/net/target/
          key: ${{ runner.os }}-cargo-publish-${{ hashFiles('**/Cargo.lock') }}

      # Dry-run the root crate first so a packaging failure
      # (missing license file, path-only deps, oversized package,
      # etc.) fails fast before we touch the registry. The SDK
      # can't be dry-run independently — `cargo publish --dry-run`
      # tries to resolve every dep against crates.io, and the
      # SDK's `net-mesh` dep doesn't exist there until the step
      # after this one publishes it. The actual SDK publish below
      # carries its own packaging check.
      - name: cargo publish --dry-run (net-mesh)
        working-directory: net/crates/net
        run: cargo publish --dry-run

      - name: Publish net-mesh
        working-directory: net/crates/net
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish

      # `net-mesh-sdk-macros` is a pure proc-macro crate with no
      # workspace deps — it can be dry-run and published independently
      # of `net-mesh`. Publishing it here (before the SDK) means the
      # SDK's `net-mesh-sdk-macros = { version = "...", path = ... }`
      # dep resolves on crates.io during the SDK publish.
      - name: cargo publish --dry-run (net-mesh-sdk-macros)
        working-directory: net/crates/net/sdk-macros
        run: cargo publish --dry-run

      - name: Publish net-mesh-sdk-macros
        working-directory: net/crates/net/sdk-macros
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish

      # The crates.io sparse index needs a moment to expose the new
      # versions before a dependent crate's publish can resolve them.
      # 30 s is conservative; raise if the next step starts failing
      # with "no matching package named `net-mesh[-sdk-macros]` found".
      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish net-mesh-sdk
        working-directory: net/crates/net/sdk
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish
