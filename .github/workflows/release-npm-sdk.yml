name: Release NPM SDK

# Publishes `@ai2070/net-sdk` (the pure-TypeScript SDK at
# `sdk-ts/`) to npm. The napi binding `@ai2070/net` ships via
# `release-npm.yml`; this is the higher-level wrapper on top.
#
# Tag schema: `npm-sdk-v<semver>` (e.g. `npm-sdk-v0.18.0`).
#
# Required repository secret: `NPM_TOKEN`
#   Generate at https://www.npmjs.com/settings/<user>/tokens with
#   the `Automation` token type so 2FA doesn't block CI publishes.

on:
  push:
    tags:
      - "npm-sdk-v*"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: Build + publish
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: net/crates/net/sdk-ts
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      # The sdk-ts `prebuild` script runs `napi build` in
      # `bindings/node` when `index.d.ts` is missing (which it always
      # is in a fresh CI checkout — the file is gitignored). napi-rs
      # spawns cargo to build the cdylib, so the Rust toolchain has
      # to be on PATH.
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            net/crates/net/target/
          key: ${{ runner.os }}-cargo-npm-sdk-${{ hashFiles('**/Cargo.lock') }}

      - name: Install dependencies
        run: npm i

      - name: Type-check + compile
        # `npm run build`'s `prebuild` hook runs `napi build` in the
        # sibling `bindings/node` directory (release flags matching
        # `bindings/node/package.json`'s `build` script) before tsc
        # runs against the freshly-generated `index.d.ts`.
        run: npm run build

      - name: Verify dist/ was produced
        run: |
          test -f dist/index.js || (echo "dist/index.js missing"; exit 1)
          test -f dist/index.d.ts || (echo "dist/index.d.ts missing"; exit 1)

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
