name: Release net-cli binaries

# Builds prebuilt tarballs of the `net-mesh` binary for every
# supported target triple and uploads them to the GitHub Release
# for the tag that fired the run. Sits alongside
# `release-net-cli.yml` (crates.io) and `release-npm-cli.yml` /
# `release-pypi-cli.yml` (per-registry shims); the three publish
# channels all fire off the same `cli-v*` tag.
#
# Naming convention:
#   net-cli-v<version>-<triple>.tar.gz       (Unix + macOS)
#   net-cli-v<version>-<triple>.zip          (Windows)
#   SHA256SUMS                               (aggregated, attached
#                                            once per release)
#
# Layout inside each archive:
#   net-cli-v<version>-<triple>/
#     net-mesh[.exe]                         The binary.
#     LICENSE                                Apache-2.0.
#     README.md                              Top-level crate README.
#     net-mesh.ps1                           PowerShell completions.
#     share/bash-completion/completions/net-mesh
#     share/zsh/site-functions/_net-mesh
#     share/fish/vendor_completions.d/net-mesh.fish
#     share/man/man1/net-mesh.1              troff(1) man page.
#
# Completions + man page come from a single `shared-assets` job
# that builds the CLI on Linux x86_64 and invokes
# `net-mesh completion <shell>` / `net-mesh man`. They're shell
# scripts + troff — distro-agnostic, so every target tarball ships
# the same files.

on:
  push:
    tags:
      - "cli-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release"
        required: true

env:
  CARGO_TERM_COLOR: always

jobs:
  shared-assets:
    name: Generate completions + man page
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v7

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          VERSION="${TAG#cli-v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            net/crates/net/target/
          key: ${{ runner.os }}-cargo-cli-assets-${{ hashFiles('**/Cargo.lock') }}

      - name: Build CLI (native, for completion + man generation)
        working-directory: net/crates/net
        run: cargo build --release -p net-cli

      - name: Generate completions + man page
        shell: bash
        run: |
          BIN=net/crates/net/target/release/net-mesh
          mkdir -p assets/share/bash-completion/completions
          mkdir -p assets/share/zsh/site-functions
          mkdir -p assets/share/fish/vendor_completions.d
          mkdir -p assets/share/man/man1
          "$BIN" completion bash       > assets/share/bash-completion/completions/net-mesh
          "$BIN" completion zsh        > assets/share/zsh/site-functions/_net-mesh
          "$BIN" completion fish       > assets/share/fish/vendor_completions.d/net-mesh.fish
          "$BIN" completion powershell > assets/net-mesh.ps1
          "$BIN" man                   > assets/share/man/man1/net-mesh.1

      - name: Upload shared assets
        uses: actions/upload-artifact@v7
        with:
          name: shared-assets
          path: assets
          if-no-files-found: error

  build:
    needs: shared-assets
    name: Build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            archive: tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            archive: tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
            archive: zip

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Add target to pinned toolchain
        working-directory: net/crates/net
        shell: bash
        run: rustup target add ${{ matrix.target }}

      - name: Install cross-compilation tools (aarch64-linux-gnu)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          mkdir -p "$HOME/.cargo"
          cat >> "$HOME/.cargo/config.toml" <<'EOF'
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      # Cross-compile to musl via cargo-zigbuild. The hand-rolled
      # zig-cc wrapper used by `release-npm.yml` works for cdylibs
      # but breaks here: linking a static-PIE executable for musl,
      # Rust passes its self-contained `rcrt1.o` while zig cc also
      # injects its own `crt1.o`, producing a `duplicate symbol:
      # _start` link error. cargo-zigbuild handles the
      # `link-self-contained=no` + cc-rs `--target=` quirks for us.
      - name: Install zig (musl cross compiler)
        if: contains(matrix.target, 'musl')
        uses: goto-bus-stop/setup-zig@v2

      - name: Install cargo-zigbuild
        if: contains(matrix.target, 'musl')
        run: cargo install --locked cargo-zigbuild

      - name: Build CLI
        working-directory: net/crates/net
        shell: bash
        run: |
          if [[ "${{ matrix.target }}" == *musl* ]]; then
            cargo zigbuild --release -p net-cli --target ${{ matrix.target }}
          else
            cargo build --release -p net-cli --target ${{ matrix.target }}
          fi

      - name: Download shared assets
        uses: actions/download-artifact@v8
        with:
          name: shared-assets
          path: shared

      - name: Stage tarball contents
        id: stage
        shell: bash
        run: |
          VERSION="${{ needs.shared-assets.outputs.version }}"
          NAME="net-cli-v${VERSION}-${{ matrix.target }}"
          mkdir -p "stage/${NAME}"
          # Binary (suffix differs on Windows).
          if [[ "${{ matrix.archive }}" == "zip" ]]; then
            cp "net/crates/net/target/${{ matrix.target }}/release/net-mesh.exe" "stage/${NAME}/"
          else
            cp "net/crates/net/target/${{ matrix.target }}/release/net-mesh" "stage/${NAME}/"
          fi
          # Shared assets — same for every target.
          cp -r shared/share "stage/${NAME}/"
          cp shared/net-mesh.ps1 "stage/${NAME}/"
          # License + README from the repo top-level (Apache-2.0).
          cp LICENSE "stage/${NAME}/"
          cp net/crates/net/README.md "stage/${NAME}/"
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"

      - name: Pack archive
        shell: bash
        run: |
          NAME="${{ steps.stage.outputs.name }}"
          cd stage
          if [[ "${{ matrix.archive }}" == "zip" ]]; then
            # 7z is preinstalled on windows-latest; -mx=9 = max
            # compression, -bd = no progress (CI log clarity).
            7z a -mx=9 -bd "../${NAME}.zip" "${NAME}"
          else
            tar -czf "../${NAME}.tar.gz" "${NAME}"
          fi
          cd ..
          # SHA256 with the cross-platform spelling.
          if command -v sha256sum >/dev/null; then
            sha256sum "${NAME}.${{ matrix.archive }}" > "${NAME}.${{ matrix.archive }}.sha256"
          else
            shasum -a 256 "${NAME}.${{ matrix.archive }}" > "${NAME}.${{ matrix.archive }}.sha256"
          fi

      - name: Upload archive + checksum
        uses: actions/upload-artifact@v7
        with:
          name: archive-${{ matrix.target }}
          path: |
            net-cli-v*.tar.gz
            net-cli-v*.zip
            net-cli-v*.sha256
          if-no-files-found: error

  release:
    needs: [shared-assets, build]
    name: Attach to GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download every per-target archive
        uses: actions/download-artifact@v8
        with:
          pattern: archive-*
          merge-multiple: true
          path: dist

      - name: Build aggregated SHA256SUMS
        shell: bash
        run: |
          cd dist
          # Namespaced filename so the cli + deck workflows can
          # both attach to the same umbrella `v<version>` release
          # without overwriting each other's checksums file.
          cat *.sha256 | sort > SHA256SUMS-cli
          rm *.sha256
          ls -la

      - name: Attach archives to umbrella release
        uses: softprops/action-gh-release@v3
        with:
          # The umbrella `v<version>` GitHub Release is created
          # by the main `v*` tag in RELEASE_STEPS.md. This workflow
          # is triggered by the `cli-v*` fan-out tag but attaches
          # tarballs to the umbrella release so consumers find all
          # platform binaries in one place.
          tag_name: v${{ needs.shared-assets.outputs.version }}
          files: dist/*
          fail_on_unmatched_files: true
