name: Release Python

# Publishes the PyO3 binding wheels for `net-mesh` (the
# native module that exposes `from net import ...`) to PyPI.
# The pure-Python SDK `net-mesh-sdk` ships via
# `release-pypi-sdk.yml`.
#
# Tag schema: `python-v<semver>`.
#
# Authentication: PyPI Trusted Publishing — the `pypi`
# environment + `id-token: write` permission combination below.
# When the PyPI distribution name changed from `net` to
# `net-mesh`, the Trusted Publisher entry on PyPI also has to
# be re-pinned (Account → Publishing) for the new project name;
# otherwise the publish step fails with "OIDC token has no
# associated publisher".

on:
  push:
    tags:
      - "python-v*"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          # `extension-module` (the cdylib must not link libpython) is
          # passed explicitly rather than trusting maturin to merge
          # `[tool.maturin] features` from pyproject.toml with CLI args.
          args: --release --out dist --find-interpreter --features redis,extension-module
          sccache: "true"
          # Use manylinux_2_28 (Rocky 8, gcc 11+) instead of the
          # default `auto` (which picks manylinux2014 with gcc 4.8).
          # ring 0.17's ARM assembly fails to compile under the
          # older toolchain because __ARM_ARCH is not defined for
          # .S files.
          manylinux: 2_28
          # Belt-and-suspenders for the same ring/aarch64 issue:
          # explicitly define __ARM_ARCH=8 for cross-compiled .S
          # files. Harmless on x86_64 (the env var is only consumed
          # by the aarch64 cross-toolchain) and a no-op on
          # manylinux_2_28's modern gcc, but kept as a safety net
          # in case the manylinux base ever rolls back.
          before-script-linux: |
            export CFLAGS_aarch64_unknown_linux_gnu="-D__ARM_ARCH=8"
          working-directory: net/crates/net/bindings/python

      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-linux-${{ matrix.target }}
          path: net/crates/net/bindings/python/dist

  macos:
    runs-on: macos-latest
    strategy:
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          # `extension-module` (the cdylib must not link libpython) is
          # passed explicitly rather than trusting maturin to merge
          # `[tool.maturin] features` from pyproject.toml with CLI args.
          args: --release --out dist --find-interpreter --features redis,extension-module
          sccache: "true"
          working-directory: net/crates/net/bindings/python

      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-macos-${{ matrix.target }}
          path: net/crates/net/bindings/python/dist

  windows:
    strategy:
      matrix:
        include:
          - runner: windows-latest
            target: x64
            py-arch: x64
          - runner: windows-11-arm
            target: aarch64
            py-arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          architecture: ${{ matrix.py-arch }}

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          # `extension-module` (the cdylib must not link libpython) is
          # passed explicitly rather than trusting maturin to merge
          # `[tool.maturin] features` from pyproject.toml with CLI args.
          args: --release --out dist --find-interpreter --features redis,extension-module
          sccache: "true"
          working-directory: net/crates/net/bindings/python

      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-windows-${{ matrix.target }}
          path: net/crates/net/bindings/python/dist

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
          working-directory: net/crates/net/bindings/python

      - name: Upload sdist
        uses: actions/upload-artifact@v7
        with:
          name: wheels-sdist
          path: net/crates/net/bindings/python/dist

  publish:
    needs: [linux, macos, windows, sdist]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - name: List distributions
        run: ls -la dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # PEP 740 attestations sign each wheel via sigstore and
          # upload the entry to rekor.sigstore.dev. That public
          # transparency log is an external dependency outside our
          # control; when it 502s / drops the connection mid-request
          # it blocks the whole release even though the wheels and
          # the Trusted-Publishing (OIDC) path are fine. Disabled so
          # a Rekor outage can't gate a release. Re-enable
          # (`attestations: true`, the action default) once sigstore
          # reliability is no longer a release risk — Trusted
          # Publishing via `id-token: write` is unaffected either way.
          attestations: false
