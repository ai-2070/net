name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: net/crates/net
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            net/crates/net/target/
          key: ${{ runner.os }}-cargo-unit-${{ hashFiles('**/Cargo.lock') }}

      - name: Run unit tests
        run: cargo test --lib --features "net redex cortex netdb"

  integration-tests:
    name: Integration tests (net, 3-node, Mikoshi, RedEX, CortEX, NetDB, nRPC)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: net/crates/net
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            net/crates/net/target/
          key: ${{ runner.os }}-cargo-integration-${{ hashFiles('**/Cargo.lock') }}

      # redis and jetstream integration tests are intentionally skipped:
      # `required-features = ["redis" | "jetstream"]` in Cargo.toml excludes
      # them from compilation under this feature set. Wire them in separately
      # once CI service containers are added.

      # === Bus core (no features) =========================================
      - name: Bus shutdown drain
        if: ${{ !cancelled() }}
        run: cargo test --test bus_shutdown_drain
      - name: Bus stranded flush
        if: ${{ !cancelled() }}
        run: cargo test --test bus_stranded_flush

      # === FFI (no features) ==============================================
      - name: FFI shutdown race
        if: ${{ !cancelled() }}
        run: cargo test --test ffi_shutdown_race
      - name: FFI poll buffer
        if: ${{ !cancelled() }}
        run: cargo test --test ffi_poll_buffer

      # === Net mesh (transport / channel / peer / placement) ==============
      - name: Net integration
        if: ${{ !cancelled() }}
        run: cargo test --test integration_net --features net
      - name: Three-node integration
        if: ${{ !cancelled() }}
        run: cargo test --test three_node_integration --features net
      - name: Channel auth
        if: ${{ !cancelled() }}
        run: cargo test --test channel_auth --features net
      - name: Channel auth hardening
        if: ${{ !cancelled() }}
        run: cargo test --test channel_auth_hardening --features net
      - name: Connect post-start
        if: ${{ !cancelled() }}
        run: cargo test --test connect_post_start --features net
      - name: Failure detector matrix
        if: ${{ !cancelled() }}
        run: cargo test --test failure_detector_matrix --features net
      - name: Parallel bind stress
        if: ${{ !cancelled() }}
        run: cargo test --test parallel_bind_stress --features net
      - name: Peer-death evicts peer map
        if: ${{ !cancelled() }}
        run: cargo test --test peer_death_evicts_peer_map --features net
      - name: Send subprotocol malformed
        if: ${{ !cancelled() }}
        run: cargo test --test send_subprotocol_malformed --features net
      - name: Subnet enforcement
        if: ${{ !cancelled() }}
        run: cargo test --test subnet_enforcement --features net
      - name: Placement-filter callback integration
        if: ${{ !cancelled() }}
        run: cargo test --test integration_placement_filter_callback --features net

      # === Capability & discovery =========================================
      - name: Capability broadcast
        if: ${{ !cancelled() }}
        run: cargo test --test capability_broadcast --features net
      - name: Capability multihop
        if: ${{ !cancelled() }}
        run: cargo test --test capability_multihop --features net
      - name: Capability scope
        if: ${{ !cancelled() }}
        run: cargo test --test capability_scope --features net
      - name: Capability schema doc guard
        if: ${{ !cancelled() }}
        run: cargo test --test capability_schema_doc_guard --features net
      - name: Chain discovery
        if: ${{ !cancelled() }}
        run: cargo test --test chain_discovery --features net
      - name: Cross-lang capability fixtures
        if: ${{ !cancelled() }}
        run: cargo test --test cross_lang_capability_fixtures --features net

      # === NAT traversal ==================================================
      - name: Connect direct
        if: ${{ !cancelled() }}
        run: cargo test --test connect_direct --features "net nat-traversal"
      - name: NAT classify
        if: ${{ !cancelled() }}
        run: cargo test --test nat_classify --features "net nat-traversal"
      - name: Peer-death clears capability index
        if: ${{ !cancelled() }}
        run: cargo test --test peer_death_clears_capability_index --features "net nat-traversal"
      - name: Punch keepalive
        if: ${{ !cancelled() }}
        run: cargo test --test punch_keepalive --features "net nat-traversal"
      - name: Punch keepalive timing
        if: ${{ !cancelled() }}
        run: cargo test --test punch_keepalive_timing --features "net nat-traversal"
      - name: Reflex probe
        if: ${{ !cancelled() }}
        run: cargo test --test reflex_probe --features "net nat-traversal"
      - name: Reflex override
        if: ${{ !cancelled() }}
        run: cargo test --test reflex_override --features "net nat-traversal"
      - name: Rendezvous ack
        if: ${{ !cancelled() }}
        run: cargo test --test rendezvous_ack --features "net nat-traversal"
      - name: Rendezvous coordinator
        if: ${{ !cancelled() }}
        run: cargo test --test rendezvous_coordinator --features "net nat-traversal"

      # === Port mapping (UPnP-IGD / NAT-PMP / PCP) ========================
      - name: Port mapping null
        if: ${{ !cancelled() }}
        run: cargo test --test port_mapping_null --features "net port-mapping"
      - name: Port mapping real router
        if: ${{ !cancelled() }}
        run: cargo test --test port_mapping_real_router --features "net port-mapping"

      # === Mikoshi (migration) ============================================
      - name: Mikoshi integration
        if: ${{ !cancelled() }}
        run: cargo test --test migration_integration --features net
      - name: Mikoshi target-failure mid-chunking
        if: ${{ !cancelled() }}
        run: cargo test --test migration_target_failure_mid_chunking --features net

      # === RedEX ==========================================================
      - name: RedEX integration
        if: ${{ !cancelled() }}
        run: cargo test --test integration_redex --features redex
      - name: RedEX replication e2e (real-wire two/three-node)
        # Pulls in the `net` feature because the e2e suite uses
        # `MeshNode` + `MeshNodeConfig` for the real-wire NKpsk0
        # handshake. The `redex` feature is the actual gate (the
        # tests are `#![cfg(feature = "redex")]`).
        if: ${{ !cancelled() }}
        run: cargo test --test redex_replication_e2e --features "redex net"
      - name: RedEX replication DST (deterministic simulation)
        # Single-threaded harness; doesn't need `net` — runs the
        # production state machine + election + catch-up + tracker
        # logic against virtual nodes with explicit clock + message
        # queue + partition matrix.
        if: ${{ !cancelled() }}
        run: cargo test --test redex_replication_dst --features redex

      # === CortEX =========================================================
      - name: CortEX adapter integration
        if: ${{ !cancelled() }}
        run: cargo test --test integration_cortex_adapter --features cortex
      - name: CortEX tasks integration
        if: ${{ !cancelled() }}
        run: cargo test --test integration_cortex_tasks --features cortex
      - name: CortEX memories integration
        if: ${{ !cancelled() }}
        run: cargo test --test integration_cortex_memories --features cortex
      - name: CortEX RYW global cap
        if: ${{ !cancelled() }}
        run: cargo test --test cortex_ryw_global_cap --features cortex

      # === NetDB ==========================================================
      - name: NetDB integration
        if: ${{ !cancelled() }}
        run: cargo test --test integration_netdb --features netdb

      # === nRPC ===========================================================
      - name: nRPC inbound dispatcher
        if: ${{ !cancelled() }}
        run: cargo test --test nrpc_inbound_dispatcher --features net
      - name: nRPC queue-group dispatch
        if: ${{ !cancelled() }}
        run: cargo test --test queue_group_dispatch --features net
      - name: nRPC loopback
        if: ${{ !cancelled() }}
        run: cargo test --test integration_nrpc_loopback --features cortex
      - name: nRPC mesh
        if: ${{ !cancelled() }}
        run: cargo test --test integration_nrpc_mesh --features cortex
      - name: nRPC streaming
        if: ${{ !cancelled() }}
        run: cargo test --test integration_nrpc_streaming --features cortex
      - name: nRPC service discovery
        if: ${{ !cancelled() }}
        run: cargo test --test integration_nrpc_service_discovery --features cortex
      - name: nRPC predicate-header integration
        if: ${{ !cancelled() }}
        run: cargo test --test integration_nrpc_predicate_header --features cortex
      - name: nRPC cross-lang
        if: ${{ !cancelled() }}
        run: cargo test --test integration_nrpc_cross_lang --features cortex

      # === Dataforts ======================================================
      - name: Dataforts net-blob CLI tests
        if: ${{ !cancelled() }}
        run: cargo test --test net_blob_cli --features dataforts,cli
      - name: Dataforts blob e2e (multi-node + migration)
        # The blob e2e suite includes the 3-node parallel migration
        # scenario in `three_node_parallel_migration_lands_blob_on_two_peers`.
        # `redex-disk` is required so MeshBlobAdapter can spin up a
        # real on-disk RedEX per node.
        if: ${{ !cancelled() }}
        run: cargo test --test dataforts_blob_e2e --features dataforts,redex-disk
      - name: Dataforts greedy e2e (cache + speculative pull)
        if: ${{ !cancelled() }}
        run: cargo test --test dataforts_greedy_e2e --features dataforts
      - name: Dataforts gravity e2e
        if: ${{ !cancelled() }}
        run: cargo test --test dataforts_gravity_e2e --features dataforts

  loom-tests:
    name: Loom concurrency models
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: net/crates/net
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # Loom builds need their own cache key — the `--cfg loom`
      # RUSTFLAGS pulls in a different set of dev-deps (`loom`
      # itself is `[target.'cfg(loom)'.dev-dependencies]`) and
      # rebuilds every atomic-touching crate with loom's
      # substitute primitives. Sharing the cache with non-loom
      # jobs would just thrash both.
      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            net/crates/net/target/
          key: ${{ runner.os }}-cargo-loom-${{ hashFiles('**/Cargo.lock') }}

      # Loom tests exhaustively explore thread interleavings; release
      # mode is mandatory (debug builds are too slow to converge in CI
      # time budget). No feature flags needed — the models in
      # `loom_models.rs` use loom's substitute atomics standalone,
      # not the production types.
      - name: Run loom models
        run: cargo test --release --test loom_models
        env:
          RUSTFLAGS: --cfg loom

  rust-sdk-tests:
    name: Rust SDK tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: net/crates/net/sdk
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            net/crates/net/target/
          key: ${{ runner.os }}-cargo-sdk-${{ hashFiles('**/Cargo.lock') }}

      - name: Run Rust SDK tests (includes mesh_stream_backpressure)
        run: cargo test --features net

  node-tests:
    name: Node bindings tests (vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: net/crates/net/bindings/node
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            net/crates/net/target/
          key: ${{ runner.os }}-cargo-node-${{ hashFiles('**/Cargo.lock') }}

      - name: Install npm dependencies
        run: npm i

      # Build napi binding with the features the vitest suite covers:
      # `net` for the mesh surface + `cortex` for the CortEX / NetDB
      # tests + `compute` for the MeshDaemon / migration tests +
      # `groups` for the `ReplicaGroup` / `ForkGroup` / `StandbyGroup`
      # tests (Stages 3 + 4 of `SDK_COMPUTE_SURFACE_PLAN` and
      # `SDK_GROUPS_SURFACE_PLAN`) + `test-helpers` so
      # `_testInjectSyntheticPeer` is exported for the group-placement
      # fixtures.
      #
      # `cortex` transitively enables redex + netdb via the binding's
      # feature graph. Skip the `redis` default — the Node suite
      # doesn't hit it, and pulling it in would need a service
      # container.
      #
      # Invoke napi directly (not `npm run build:test`) so we can pass
      # `--no-default-features` to suppress `redis`; the package.json
      # scripts bake `redis` in for consumers who want the full
      # surface from source.
      - name: Build native module
        working-directory: net/crates/net/bindings/node
        run: npx napi build --platform --no-default-features --features net,cortex,compute,groups,test-helpers

      - name: Run tests
        run: npm test

  sdk-ts-tests:
    name: TypeScript SDK tests (vitest + tsc)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: net/crates/net/sdk-ts
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            net/crates/net/target/
          key: ${{ runner.os }}-cargo-sdk-ts-${{ hashFiles('**/Cargo.lock') }}

      # `sdk-ts/package.json` carries `@ai2070/net: file:../bindings/node`
      # as a devDependency, so `npm i` over there picks up the sibling
      # binding from the working tree. The binding's `.node` cdylib has
      # to be built first or `npm test` will fail to load it.
      #
      # Feature flags MUST include `redis` even though the suite never
      # opens a Redis connection: `sdk-ts/src/redis-dedup.ts` does a
      # real `export { RedisStreamDedup } from '@ai2070/net'`, and the
      # napi-generated `index.d.ts` only carries the `RedisStreamDedup`
      # declaration when the binding was built with the `redis`
      # feature. Without it, tsc fails the SDK build with
      # `Module '"@ai2070/net"' has no exported member
      # 'RedisStreamDedup'`. The runtime side is also satisfied — the
      # `.node` cdylib carries the class — but the runtime never opens
      # a connection because no SDK code instantiates the helper in
      # the test suite.
      #
      # `test-helpers` is required so `_testInjectSyntheticPeer` is
      # exported for the group-placement fixtures —
      # `sdk-ts/test/groups.test.ts` uses the same hook the bindings
      # suite does.
      - name: Build native module
        working-directory: net/crates/net/bindings/node
        run: |
          npm i --ignore-scripts
          npx napi build --platform --no-default-features --features redis,net,cortex,compute,groups,test-helpers

      - name: Install npm dependencies
        run: npm i

      # `tsc` first — the v0.11 `originHash` widening (u32 → u64,
      # number → bigint) cascaded through every method signature and
      # interface in the SDK's source. Type-check failures here mean
      # the SDK's type surface drifted away from the binding's
      # generated `.d.ts`; surface them as a CI failure rather than
      # only as a `npm run build` failure on a developer workstation.
      - name: Type-check (tsc)
        run: npm run build

      - name: Run vitest
        run: npm test

  python-tests:
    name: Python bindings tests (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: net/crates/net/bindings/python
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            net/crates/net/target/
          key: ${{ runner.os }}-cargo-python-${{ hashFiles('**/Cargo.lock') }}

      # maturin develop requires a virtualenv (refuses to install into
      # the system Python). Create one and prepend it to PATH so every
      # subsequent step resolves `maturin`, `pip`, `pytest`, and the
      # installed `net` extension from the venv.
      - name: Create virtualenv
        run: |
          python -m venv .venv
          echo "${PWD}/.venv/bin" >> "$GITHUB_PATH"
          echo "VIRTUAL_ENV=${PWD}/.venv" >> "$GITHUB_ENV"

      - name: Install maturin and pytest
        run: pip install --upgrade pip maturin pytest

      # `net,cortex,compute,groups` mirrors the Node binding's
      # feature set for tests. `groups` is needed so `test_groups.py`
      # can import `ReplicaGroup` / `ForkGroup` / `StandbyGroup` /
      # `GroupError`; without it the module would skip via the
      # `pytestmark` guard in the test file. Default `redis` is
      # omitted because the suite doesn't exercise the Redis adapter.
      - name: Build and install bindings
        run: maturin develop --no-default-features --features net,cortex,compute,groups

      - name: Run tests
        run: pytest -v

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: net/crates/net
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            net/crates/net/target/
          key: ${{ runner.os }}-cargo-clippy-${{ hashFiles('**/Cargo.lock') }}

      - name: Run clippy
        run: cargo clippy --all-features --all-targets -- -D warnings

  # The `clippy` job above lints only the root `net` package — `cargo
  # clippy` without `--workspace` doesn't traverse workspace members,
  # and the bindings each need a different feature combination so a
  # single `--workspace --all-features` invocation isn't workable
  # either (the Python and Node bindings carry build-tool-specific
  # default features that conflict in CI). This matrix lints each
  # FFI / SDK crate with the same feature flags its build / test job
  # uses, so a clippy regression in any binding fails CI before it
  # lands.
  ffi-clippy:
    name: FFI clippy (${{ matrix.crate.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        crate:
          - name: rust-sdk
            path: net/crates/net/sdk
            # `full` enables every SDK feature flag (net, cortex,
            # compute, groups, redis, jetstream). Mirrors the
            # `rust-sdk-tests` job's surface plus the optional
            # adapter features.
            features: --features full
          - name: node
            path: net/crates/net/bindings/node
            # Mirrors the `node-tests` napi build (no redis default,
            # plus `test-helpers` so the test-only FFI symbols are
            # included in the lint set).
            features: --no-default-features --features net,cortex,compute,groups,test-helpers
          - name: python
            path: net/crates/net/bindings/python
            # Mirrors the `python-tests` `maturin develop` invocation.
            features: --no-default-features --features net,cortex,compute,groups
          - name: go-compute-ffi
            path: net/crates/net/bindings/go/compute-ffi
            # Default features only — the cdylib production build
            # ships without `test-helpers`, and that is the surface
            # we want CI to enforce against. The `test-helpers`
            # symbols are exercised by the `go test` suite, not by
            # consumers.
            features: ""
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            net/crates/net/target/
          key: ${{ runner.os }}-cargo-clippy-ffi-${{ matrix.crate.name }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Run clippy
        working-directory: ${{ matrix.crate.path }}
        run: cargo clippy ${{ matrix.crate.features }} --all-targets -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: net/crates/net
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  doc:
    name: Documentation
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: net/crates/net
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            net/crates/net/target/
          key: ${{ runner.os }}-cargo-doc-${{ hashFiles('**/Cargo.lock') }}

      - name: Build documentation
        run: cargo doc --no-deps --all-features
        env:
          RUSTDOCFLAGS: -D warnings
