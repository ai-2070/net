name: Release net-deck binaries

# Builds prebuilt tarballs of the `net-deck` TUI for every
# supported target triple and uploads them to the GitHub Release
# for the tag that fired the run. Sits alongside
# `release-net-deck.yml` (crates.io) and `release-npm-deck.yml` /
# `release-pypi-deck.yml` (per-registry shims); the three publish
# channels all fire off the same `deck-v*` tag.
#
# Naming convention:
#   net-deck-v<version>-<triple>.tar.gz      (Unix + macOS)
#   net-deck-v<version>-<triple>.zip         (Windows)
#   SHA256SUMS                               (aggregated)
#
# Layout inside each archive:
#   net-deck-v<version>-<triple>/
#     net-deck[.exe]                         The binary.
#     LICENSE                                Apache-2.0.
#     README.md                              Top-level crate README.
#
# Deck has no clap subcommands (the binary is a TUI), so no shell
# completions / man page are generated — keeps this workflow simpler
# than its `release-binaries-cli.yml` sibling.

on:
  push:
    tags:
      - "deck-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. deck-v0.19.0)"
        required: true

env:
  CARGO_TERM_COLOR: always

jobs:
  resolve-version:
    name: Resolve version from tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Extract version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          VERSION="${TAG#deck-v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved $TAG → version $VERSION"

  build:
    needs: resolve-version
    name: Build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            archive: tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            archive: tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
            archive: zip

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Add target to pinned toolchain
        working-directory: net/crates/net
        shell: bash
        run: rustup target add ${{ matrix.target }}

      - name: Install cross-compilation tools (aarch64-linux-gnu)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          mkdir -p "$HOME/.cargo"
          cat >> "$HOME/.cargo/config.toml" <<'EOF'
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      # Cross-compile to musl via cargo-zigbuild. The hand-rolled
      # zig-cc wrapper used by `release-npm.yml` works for cdylibs
      # but breaks here: linking a static-PIE executable for musl,
      # Rust passes its self-contained `rcrt1.o` while zig cc also
      # injects its own `crt1.o`, producing a `duplicate symbol:
      # _start` link error. cargo-zigbuild handles the
      # `link-self-contained=no` + cc-rs `--target=` quirks for us.
      - name: Install zig (musl cross compiler)
        if: contains(matrix.target, 'musl')
        uses: goto-bus-stop/setup-zig@v2

      - name: Install cargo-zigbuild
        if: contains(matrix.target, 'musl')
        run: cargo install --locked cargo-zigbuild

      - name: Build deck
        working-directory: net/crates/net
        shell: bash
        run: |
          if [[ "${{ matrix.target }}" == *musl* ]]; then
            cargo zigbuild --release -p net-deck --target ${{ matrix.target }}
          else
            cargo build --release -p net-deck --target ${{ matrix.target }}
          fi

      - name: Stage archive contents
        id: stage
        shell: bash
        run: |
          VERSION="${{ needs.resolve-version.outputs.version }}"
          NAME="net-deck-v${VERSION}-${{ matrix.target }}"
          mkdir -p "stage/${NAME}"
          if [[ "${{ matrix.archive }}" == "zip" ]]; then
            cp "net/crates/net/target/${{ matrix.target }}/release/net-deck.exe" "stage/${NAME}/"
          else
            cp "net/crates/net/target/${{ matrix.target }}/release/net-deck" "stage/${NAME}/"
          fi
          cp LICENSE "stage/${NAME}/"
          cp net/crates/net/README.md "stage/${NAME}/"
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"

      - name: Pack archive
        shell: bash
        run: |
          NAME="${{ steps.stage.outputs.name }}"
          cd stage
          if [[ "${{ matrix.archive }}" == "zip" ]]; then
            7z a -mx=9 -bd "../${NAME}.zip" "${NAME}"
          else
            tar -czf "../${NAME}.tar.gz" "${NAME}"
          fi
          cd ..
          if command -v sha256sum >/dev/null; then
            sha256sum "${NAME}.${{ matrix.archive }}" > "${NAME}.${{ matrix.archive }}.sha256"
          else
            shasum -a 256 "${NAME}.${{ matrix.archive }}" > "${NAME}.${{ matrix.archive }}.sha256"
          fi

      - name: Upload archive + checksum
        uses: actions/upload-artifact@v7
        with:
          name: archive-${{ matrix.target }}
          path: |
            net-deck-v*.tar.gz
            net-deck-v*.zip
            net-deck-v*.sha256
          if-no-files-found: error

  release:
    needs: [resolve-version, build]
    name: Attach to GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download every per-target archive
        uses: actions/download-artifact@v8
        with:
          pattern: archive-*
          merge-multiple: true
          path: dist

      - name: Build aggregated SHA256SUMS
        shell: bash
        run: |
          cd dist
          cat *.sha256 | sort > SHA256SUMS
          rm *.sha256
          ls -la

      - name: Attach archives to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.resolve-version.outputs.tag }}
          files: dist/*
          fail_on_unmatched_files: true
