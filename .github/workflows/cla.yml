name: CLA

# Gate pull requests on a signed Individual CLA. The bot comments on any PR
# from an author who has not signed; the author signs by replying with the
# exact phrase below, and the signature (username, PR number, SHA, timestamp)
# is appended to a JSON file on the `cla-signatures` branch.
#
# `pull_request_target` — not `pull_request` — is required: the action needs
# write access to comments and commit statuses, which the read-only token on
# fork PRs does not carry. This workflow checks out no PR code and runs no
# contributor-supplied scripts, so the elevated token is not exposed to it.

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

# Explicit rather than inherited: the action writes the signature file via the
# PAT, but uses GITHUB_TOKEN for the PR comment and the commit status.
permissions:
  actions: write
  contents: read
  pull-requests: write
  statuses: write

jobs:
  cla:
    name: CLA signature
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check or record CLA signature
        # Only react to the signature phrase and to `recheck` — every other
        # comment on every issue in the repo would otherwise spawn a run.
        if: >-
          (github.event.comment.body == 'recheck' ||
          github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') ||
          github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Repo-scoped PAT with `contents: write`. GITHUB_TOKEN cannot be used
          # here: pushing the signature file back would re-trigger workflows
          # and, on fork PRs, it has no write scope at all.
          PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_SIGNATURES_TOKEN }}
        with:
          # Signatures live on an orphan-ish side branch so the master history
          # stays free of one commit per contributor.
          branch: cla-signatures
          path-to-signatures: signatures/version1/cla.json
          path-to-document: https://github.com/ai-2070/net/blob/master/CLA/individual-cla.md
          # Renovate opens the bulk of PRs on this repo and cannot sign.
          allowlist: renovate[bot],dependabot[bot],github-actions[bot],LZL0
          custom-notsigned-prcomment: >-
            Thanks for the pull request. Before it can be merged, please sign the
            [Net Individual CLA](https://github.com/ai-2070/net/blob/master/CLA/individual-cla.md)
            by posting the comment below. You keep full ownership of your work —
            the CLA only records a license to the Project. If you are
            contributing on behalf of an employer, see the
            [Corporate CLA](https://github.com/ai-2070/net/blob/master/CLA/corporate-cla.md).
          custom-pr-sign-comment: I have read the CLA Document and I hereby sign the CLA
          custom-allsigned-prcomment: All contributors have signed the CLA. Thank you.
          lock-pullrequest-aftermerge: false
